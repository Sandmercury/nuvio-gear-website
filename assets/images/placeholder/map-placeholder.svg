<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#1A1A1A"/>
  <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <line x1="40" y1="0" x2="0" y2="0" stroke="#2A2A3A" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="40" stroke="#2A2A3A" stroke-width="1"/>
  </pattern>
  <rect width="800" height="450" fill="url(#grid)"/>
  <!-- Road-like lines -->
  <line x1="0" y1="225" x2="800" y2="225" stroke="#2A2A4A" stroke-width="8"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#2A2A4A" stroke-width="8"/>
  <line x1="0" y1="112" x2="800" y2="337" stroke="#2A2A3A" stroke-width="4"/>
  <line x1="0" y1="337" x2="800" y2="112" stroke="#2A2A3A" stroke-width="3"/>
  <!-- Block shapes -->
  <rect x="60" y="60" width="130" height="80" rx="4" fill="#222235"/>
  <rect x="220" y="80" width="100" height="60" rx="4" fill="#222235"/>
  <rect x="480" y="60" width="150" height="100" rx="4" fill="#222235"/>
  <rect x="60" y="300" width="180" height="90" rx="4" fill="#222235"/>
  <rect x="560" y="310" width="120" height="80" rx="4" fill="#222235"/>
  <!-- Pin -->
  <circle cx="400" cy="225" r="22" fill="#C6FF00"/>
  <circle cx="400" cy="225" r="12" fill="#111111"/>
  <circle cx="400" cy="225" r="5" fill="#C6FF00"/>
  <circle cx="400" cy="225" r="36" fill="none" stroke="#C6FF00" stroke-width="1.5" opacity="0.3"/>
  <circle cx="400" cy="225" r="52" fill="none" stroke="#C6FF00" stroke-width="1" opacity="0.15"/>
  <text x="400" y="295" text-anchor="middle" font-family="Barlow Condensed, sans-serif" font-size="16" font-weight="700" fill="#C6FF00" letter-spacing="2">NUVIO GEAR HQ</text>
  <text x="400" y="315" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#AAAAAA">Tallinn, Estonia</text>
</svg>
