<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <rect width="400" height="500" fill="#1A1A1A"/>
  <!-- Geometric pattern -->
  <pattern id="geo" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <polygon points="0,20 20,0 40,20 20,40" fill="none" stroke="#C6FF00" stroke-width="0.4" opacity="0.3"/>
  </pattern>
  <rect width="400" height="500" fill="url(#geo)"/>
  <!-- Icon: thermal bag -->
  <rect x="130" y="150" width="140" height="180" rx="12" fill="none" stroke="#C6FF00" stroke-width="3"/>
  <rect x="150" y="130" width="100" height="30" rx="6" fill="none" stroke="#C6FF00" stroke-width="2.5"/>
  <!-- thermal lines -->
  <line x1="155" y1="230" x2="245" y2="230" stroke="#C6FF00" stroke-width="2" opacity="0.6"/>
  <line x1="155" y1="250" x2="245" y2="250" stroke="#C6FF00" stroke-width="2" opacity="0.6"/>
  <line x1="155" y1="270" x2="245" y2="270" stroke="#C6FF00" stroke-width="2" opacity="0.6"/>
  <!-- flame icon -->
  <path d="M185 195 Q190 175 200 180 Q195 165 210 155 Q215 175 205 185 Q215 178 218 195 Q210 205 200 200 Q190 205 185 195Z" fill="#C6FF00" opacity="0.85"/>
  <!-- Label -->
  <text x="200" y="385" text-anchor="middle" font-family="Barlow Condensed, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" letter-spacing="4">THERMAL BAGS</text>
  <text x="200" y="410" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#AAAAAA">Insulated delivery bags</text>
  <!-- Corner accent -->
  <polygon points="0,0 60,0 0,60" fill="#C6FF00" opacity="0.15"/>
  <polygon points="400,500 340,500 400,440" fill="#C6FF00" opacity="0.15"/>
</svg>
