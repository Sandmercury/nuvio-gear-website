  <!-- Mount arm -->
  <line x1="200" y1="215" x2="200" y2="240" stroke="#C6FF00" stroke-width="3"/>
  <rect x="170" y="238" width="60" height="14" rx="4" fill="none" stroke="#C6FF00" stroke-width="2.5"/>
  <!-- Lock icon -->
  <rect x="145" y="268" width="36" height="30" rx="4" fill="none" stroke="#C6FF00" stroke-width="2.5"/>
  <path d="M152 268 L152 260 Q152 248 163 248 Q174 248 174 260 L174 268" fill="none" stroke="#C6FF00" stroke-width="2.5"/>
  <circle cx="163" cy="283" r="4" fill="#C6FF00"/>
