  <line x1="257" y1="305" x2="257" y2="315" stroke="#C6FF00" stroke-width="2"/>
  <!-- Label -->
  <text x="200" y="375" text-anchor="middle" font-family="Barlow Condensed, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" letter-spacing="4">ACCESSORIES</text>
  <text x="200" y="400" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#AAAAAA">Mounts, locks &amp; covers</text>
